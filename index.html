<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hệ thống bốc thăm câu hỏi</title>

  <!-- Montserrat có đầy đủ bộ ký tự tiếng Việt. Nếu mất Internet, web tự chuyển sang Arial. -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <!-- Cần Internet khi mở trang để tải thư viện đọc Excel -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>

  <style>
    :root {
      --red: #c8102e;
      --red-dark: #850016;
      --red-deep: #630010;
      --gold: #f5c542;
      --gold-light: #ffe99a;
      --white: #ffffff;
      --off-white: #fffaf0;
      --text: #252525;
      --muted: #6b7280;
      --line: #ead89a;
      --success: #177545;
      --danger: #b42318;
      --shadow: 0 18px 45px rgba(92, 0, 16, 0.16);
      --font-ui: "Montserrat", Arial, Helvetica, sans-serif;
      --font-content: Arial, "Montserrat", Helvetica, sans-serif;
    }

    * { box-sizing: border-box; }

    html, body {
      min-height: 100%;
      margin: 0;
      font-family: var(--font-ui);
      font-synthesis: none;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 8%, rgba(245, 197, 66, 0.25), transparent 26%),
        radial-gradient(circle at 90% 92%, rgba(200, 16, 46, 0.12), transparent 30%),
        #f4f4f4;
    }

    button, input, select, textarea { font: inherit; }

    /* Nội dung câu hỏi ưu tiên Arial để tiếng Việt rõ, dễ đọc trên máy chiếu. */
    .question-content,
    #modalQuestionContent {
      font-family: var(--font-content);
    }
    button { cursor: pointer; }
    button:disabled { cursor: not-allowed; opacity: 0.55; transform: none !important; }

    .app {
      width: min(1420px, 100%);
      min-height: 100vh;
      margin: 0 auto;
      padding: 14px;
    }

    .shell {
      min-height: calc(100vh - 28px);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border: 2px solid rgba(99, 0, 16, 0.14);
      background: var(--white);
      box-shadow: var(--shadow);
    }

    .header {
      position: relative;
      overflow: hidden;
      min-height: 118px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 190px;
      background: linear-gradient(135deg, var(--red-deep), var(--red));
      color: var(--white);
      border-bottom: 5px solid var(--gold);
    }

    .header::before,
    .header::after {
      content: "";
      position: absolute;
      width: 170px;
      height: 170px;
      border-radius: 50%;
      border: 22px solid rgba(245, 197, 66, 0.18);
    }

    .header::before { left: -72px; top: -94px; }
    .header::after { right: -72px; bottom: -105px; }

    .header h1 {
      position: relative;
      z-index: 1;
      margin: 0;
      text-align: center;
      font-size: clamp(30px, 4vw, 54px);
      letter-spacing: 0.025em;
      text-transform: uppercase;
    }

    .footer-actions {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 10px;
      padding: 10px 18px 14px;
      background: var(--off-white);
      border-top: 1px solid var(--line);
    }

    .info-btn,
    .fullscreen-btn {
      min-height: 44px;
      border: 2px solid var(--red);
      border-radius: 10px;
      background: linear-gradient(135deg, var(--red-dark), var(--red));
      color: var(--white);
      font-weight: 850;
      box-shadow: 0 6px 16px rgba(99, 0, 16, 0.14);
    }

    .info-btn {
      width: 48px;
      flex: 0 0 48px;
      padding: 0;
      font-size: 24px;
      line-height: 1;
    }

    .fullscreen-btn {
      padding: 0 18px;
      font-size: 13px;
    }

    .info-btn:hover:not(:disabled),
    .fullscreen-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      background: linear-gradient(135deg, var(--red-deep), var(--red-dark));
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(300px, 1fr) auto auto auto;
      align-items: center;
      gap: 10px;
      padding: 14px 18px;
      background: var(--off-white);
      border-top: 1px solid var(--line);
    }

    .file-label {
      min-width: 0;
      min-height: 46px;
      display: flex;
      align-items: center;
      padding: 9px 14px;
      overflow: hidden;
      border: 2px dashed #cfaa30;
      border-radius: 11px;
      background: var(--white);
      color: var(--red-dark);
      font-weight: 800;
      white-space: nowrap;
      text-overflow: ellipsis;
      cursor: pointer;
    }

    #excelFile {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
    }

    .small-btn {
      min-height: 46px;
      border: 2px solid var(--red);
      border-radius: 11px;
      padding: 0 15px;
      background: var(--white);
      color: var(--red-dark);
      font-weight: 800;
    }

    .small-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      background: #fff4d0;
    }

    .main {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      padding: clamp(18px, 2.4vw, 32px) clamp(24px, 4vw, 52px) 28px;
      background:
        linear-gradient(rgba(255, 255, 255, 0.965), rgba(255, 255, 255, 0.965)),
        repeating-linear-gradient(45deg, #f5c542 0 2px, transparent 2px 22px);
    }

    .draw-grid {
      width: min(1040px, 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: clamp(28px, 7vw, 110px);
    }

    .draw-card {
      position: relative;
      min-height: 330px;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 22px 28px;
      border: 5px solid var(--gold);
      border-radius: 16px;
      background: linear-gradient(160deg, var(--red-dark), var(--red));
      box-shadow: 0 18px 40px rgba(99, 0, 16, 0.2);
    }

    .draw-card::after {
      content: "";
      position: absolute;
      inset: 8px;
      pointer-events: none;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 10px;
    }

    .card-label {
      position: relative;
      z-index: 1;
      width: 100%;
      border: 2px solid var(--gold);
      border-radius: 7px;
      padding: 12px 10px;
      background: rgba(99, 0, 16, 0.72);
      color: var(--gold);
      text-align: center;
      font-size: clamp(22px, 2.4vw, 31px);
      font-weight: 900;
      text-transform: uppercase;
    }

    .card-value {
      position: relative;
      z-index: 1;
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 6px 8px;
      color: var(--white);
      font-size: clamp(88px, 11vw, 150px);
      font-weight: 950;
      line-height: 1;
      text-align: center;
      overflow-wrap: anywhere;
      text-shadow: 0 7px 18px rgba(0, 0, 0, 0.28);
    }

    .card-value.rolling {
      animation: pulse 0.1s linear infinite alternate;
    }

    @keyframes pulse {
      from { transform: scale(0.98); opacity: 0.78; }
      to { transform: scale(1.025); opacity: 1; }
    }

    .card-line {
      position: relative;
      z-index: 1;
      width: 78%;
      border-bottom: 3px solid var(--gold-light);
    }

    .controls {
      width: min(720px, 100%);
      margin: 38px auto 0;
      text-align: center;
    }

    .spin-btn {
      width: min(500px, 100%);
      min-height: 66px;
      border: 3px solid var(--red-dark);
      border-radius: 12px;
      padding: 12px 22px;
      background: linear-gradient(180deg, #ffe77f, var(--gold));
      color: #3f090f;
      font-size: clamp(21px, 2.3vw, 30px);
      font-weight: 950;
      box-shadow: 0 7px 0 #c18a00, 0 15px 28px rgba(99, 0, 16, 0.18);
    }

    .spin-btn:active:not(:disabled) {
      transform: translateY(5px);
      box-shadow: 0 2px 0 #c18a00, 0 9px 20px rgba(99, 0, 16, 0.16);
    }

    .status {
      display: none;
      min-height: 25px;
      margin: 22px 0 0;
      color: var(--red-dark);
      font-size: 17px;
      font-weight: 850;
      text-transform: uppercase;
    }

    .status.show { display: block; }

    .secondary-controls {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .view-btn {
      min-height: 47px;
      border: 2px solid var(--red);
      border-radius: 10px;
      padding: 0 20px;
      background: var(--red);
      color: var(--white);
      font-weight: 850;
    }

    .zero-btn {
      min-height: 47px;
      border: 2px solid var(--red-dark);
      border-radius: 10px;
      padding: 0 24px;
      background: linear-gradient(180deg, #ffe77f, var(--gold));
      color: var(--red-dark);
      font-weight: 900;
      box-shadow: 0 4px 0 #c18a00;
    }

    .zero-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      background: #ffe783;
    }

    .zero-btn:active:not(:disabled) {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #c18a00;
    }

    .info-card {
      width: min(760px, 100%);
      max-height: 90vh;
      overflow: auto;
      border: 5px solid var(--gold);
      border-radius: 22px;
      background: var(--white);
      box-shadow: 0 28px 80px rgba(0, 0, 0, 0.38);
    }

    .info-body { padding: 24px; }

    .info-turn {
      border: 2px solid var(--gold);
      border-radius: 14px;
      padding: 16px 18px;
      background: #fff8df;
      text-align: center;
    }

    .info-turn span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 850;
      text-transform: uppercase;
    }

    .info-turn strong {
      display: block;
      margin-top: 7px;
      color: var(--red-dark);
      font-size: clamp(20px, 3vw, 30px);
      line-height: 1.25;
      text-transform: uppercase;
    }

    .info-stats {
      margin-top: 18px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      border: 1px solid var(--line);
      border-radius: 14px;
      overflow: hidden;
      background: #fffdf6;
    }

    .stat {
      padding: 18px 10px;
      text-align: center;
    }

    .stat + .stat { border-left: 1px solid var(--line); }
    .stat span { display: block; color: var(--muted); font-size: 13px; font-weight: 800; text-transform: uppercase; }
    .stat strong { display: block; margin-top: 5px; color: var(--red-dark); font-size: 32px; }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 999;
      display: none;
      align-items: flex-start;
      justify-content: center;
      padding: clamp(24px, 6vh, 64px) 20px 20px;
      background: rgba(45, 0, 8, 0.7);
      backdrop-filter: blur(5px);
    }

    .modal.show { display: flex; }

    .result-card,
    .question-card,
    .info-card {
      width: min(760px, 100%);
      max-height: 90vh;
      overflow: auto;
      border: 5px solid var(--gold);
      border-radius: 22px;
      box-shadow: 0 28px 80px rgba(0, 0, 0, 0.38);
    }

    .result-card {
      padding: 30px;
      background: linear-gradient(145deg, var(--red-dark), var(--red));
      color: var(--white);
      text-align: center;
    }

    .result-card h2 {
      margin: 0 0 20px;
      color: var(--gold-light);
      font-size: clamp(25px, 4vw, 42px);
      text-transform: uppercase;
    }

    .result-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .result-item {
      border: 3px solid var(--gold);
      border-radius: 14px;
      padding: 16px 10px;
      background: var(--white);
      color: var(--red-dark);
    }

    .result-item span {
      display: block;
      color: #6e3100;
      font-size: 14px;
      font-weight: 850;
      text-transform: uppercase;
    }

    .result-item strong {
      display: block;
      margin-top: 8px;
      font-size: clamp(48px, 8vw, 88px);
      line-height: 1;
      overflow-wrap: anywhere;
    }

    .result-note { margin: 18px 0 0; color: #fff2ba; font-weight: 700; }

    .question-card { background: var(--white); }

    .question-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 17px 20px;
      background: linear-gradient(135deg, var(--red-dark), var(--red));
      color: var(--white);
    }

    .question-header h2 { margin: 0; font-size: 22px; }

    .close-btn {
      width: 42px;
      height: 42px;
      flex: 0 0 auto;
      border: 2px solid rgba(255, 255, 255, 0.75);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.12);
      color: var(--white);
      font-size: 24px;
    }

    .question-body { padding: 24px; }

    .meta {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .meta-item {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      background: #fff8df;
    }

    .meta-item span { display: block; color: var(--muted); font-size: 12px; font-weight: 800; text-transform: uppercase; }
    .meta-item strong { display: block; margin-top: 5px; color: var(--red-dark); font-size: 18px; }

    .question-content {
      border-left: 7px solid var(--gold);
      border-radius: 12px;
      padding: 20px;
      background: #fffdf6;
      font-size: clamp(18px, 2.2vw, 26px);
      line-height: 1.55;
      white-space: pre-wrap;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      z-index: 1100;
      max-width: min(620px, calc(100% - 30px));
      transform: translate(-50%, 150%);
      opacity: 0;
      border-radius: 12px;
      padding: 13px 18px;
      background: #262626;
      color: var(--white);
      text-align: center;
      font-weight: 750;
      transition: 0.25s ease;
    }

    .toast.show { transform: translate(-50%, 0); opacity: 1; }
    .toast.error { background: var(--danger); }

    @media (max-width: 900px) {
      .toolbar { grid-template-columns: 1fr 1fr; }
      .file-label { grid-column: 1 / -1; }
      .draw-grid { gap: 24px; }
      .draw-card { min-height: 285px; }
      .card-value { font-size: clamp(76px, 17vw, 120px); }
    }

    @media (max-width: 620px) {
      .app { padding: 0; }
      .shell { min-height: 100vh; border: 0; }
      .footer-actions { padding: 10px 12px 14px; }
      .info-btn, .fullscreen-btn { min-height: 46px; }
      .fullscreen-btn { width: auto; }
      .toolbar { grid-template-columns: 1fr; }
      .file-label { grid-column: auto; }
      .main { padding: 24px 13px 34px; }
      .draw-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
      .draw-card { min-height: 220px; padding: 10px 9px 16px; border-width: 3px; }
      .card-label { padding: 8px 4px; font-size: 17px; }
      .card-value { font-size: clamp(58px, 25vw, 92px); }
      .result-grid, .meta { grid-template-columns: 1fr; }
      .info-stats { grid-template-columns: 1fr 1fr 1fr; }
      .stat strong { font-size: 22px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="shell">
      <section class="main">
        <div class="draw-grid">
          <article class="draw-card">
            <div class="card-label">Nhóm</div>
            <div id="groupDisplay" class="card-value" aria-live="polite">0</div>
            <div class="card-line"></div>
          </article>

          <article class="draw-card">
            <div class="card-label">Câu hỏi</div>
            <div id="questionDisplay" class="card-value" aria-live="polite">0</div>
            <div class="card-line"></div>
          </article>
        </div>

        <div class="controls">
          <button id="spinBtn" class="spin-btn" type="button" disabled>BẮT ĐẦU BỐC THĂM</button>
          <p id="statusText" class="status" aria-live="polite"></p>

          <div class="secondary-controls">
            <button id="viewBtn" class="view-btn" type="button" disabled>XEM NỘI DUNG CÂU HỎI</button>
            <button id="zeroBtn" class="zero-btn" type="button" disabled>RESET</button>
          </div>
        </div>

      </section>

      <!-- Thanh nạp và quản lý dữ liệu được đặt dưới cùng giao diện -->
      <section class="toolbar" aria-label="Công cụ dữ liệu">
        <label id="fileLabel" class="file-label" for="excelFile">📁 CHỌN FILE DULIEUBOCTHAM.XLSX</label>
        <input id="excelFile" type="file" accept=".xlsx,.xls,.xlsm" />
        <button id="sampleBtn" class="small-btn" type="button">TẢI EXCEL MẪU</button>
        <button id="resetBtn" class="small-btn" type="button" disabled>ĐẶT LẠI</button>
        <button id="viewBtnTop" class="small-btn" type="button" disabled>XEM CÂU HỎI</button>
      </section>

      <footer class="footer-actions" aria-label="Điều khiển màn hình">
        <button id="infoBtn" class="info-btn" type="button" title="Xem thông tin bốc thăm" aria-label="Xem thông tin bốc thăm">ⓘ</button>
        <button id="fullScreenBtn" class="fullscreen-btn" type="button">⛶ TOÀN MÀN HÌNH</button>
      </footer>
    </section>
  </main>

  <div id="infoModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="infoTitle">
    <section class="info-card">
      <header class="question-header">
        <h2 id="infoTitle">Thông tin bốc thăm</h2>
        <button id="closeInfoBtn" class="close-btn" type="button" aria-label="Đóng">×</button>
      </header>
      <div class="info-body">
        <div class="info-turn">
          <span>Tiến trình hiện tại</span>
          <strong id="infoTurnText">Chưa nạp dữ liệu</strong>
        </div>
        <div class="info-stats">
          <div class="stat"><span>Tổng số câu</span><strong id="totalCount">0</strong></div>
          <div class="stat"><span>Đã bốc</span><strong id="usedCount">0</strong></div>
          <div class="stat"><span>Còn lại</span><strong id="remainingCount">0</strong></div>
        </div>
      </div>
    </section>
  </div>

  <div id="resultModal" class="modal" role="dialog" aria-modal="true" aria-label="Kết quả bốc thăm">
    <section class="result-card">
      <h2>Kết quả bốc thăm</h2>
      <div class="result-grid">
        <div class="result-item"><span>Nhóm</span><strong id="resultGroup">-</strong></div>
        <div class="result-item"><span>Câu hỏi</span><strong id="resultQuestion">-</strong></div>
      </div>
      <p class="result-note">Thông báo tự đóng sau 2 giây</p>
    </section>
  </div>

  <div id="questionModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="questionTitle">
    <section class="question-card">
      <header class="question-header">
        <h2 id="questionTitle">Nội dung câu hỏi</h2>
        <button id="closeQuestionBtn" class="close-btn" type="button" aria-label="Đóng">×</button>
      </header>
      <div class="question-body">
        <div class="meta">
          <div class="meta-item"><span>Nhóm</span><strong id="modalTopic">---</strong></div>
          <div class="meta-item"><span>Mã câu hỏi</span><strong id="modalQuestionCode">---</strong></div>
        </div>
        <div id="modalQuestionContent" class="question-content">---</div>
      </div>
    </section>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script>
    "use strict";

    // ===== THÔNG SỐ VẬN HÀNH =====
    const ROLL_DURATION_MS = 3000;   // Quay trong 3 giây
    const ROLL_INTERVAL_MS = 100;    // Nhảy số sau mỗi 0,1 giây
    const RESULT_VISIBLE_MS = 2000;  // Hiện thông báo kết quả 2 giây
    const ROLLING_POOL_SIZE = 30;    // 30 dòng dữ liệu đầu chỉ dùng để chạy hiệu ứng

    // ===== DỮ LIỆU =====
    let topics = [];
    let allQuestions = [];
    let rollingQuestions = [];
    let presetResults = [];
    let nextResultIndex = 0;
    let currentResult = null;
    let isRolling = false;
    let storageKey = "";
    let resultTimer = null;

    // ===== GIAO DIỆN =====
    const excelFile = document.getElementById("excelFile");
    const fileLabel = document.getElementById("fileLabel");
    const sampleBtn = document.getElementById("sampleBtn");
    const resetBtn = document.getElementById("resetBtn");
    const spinBtn = document.getElementById("spinBtn");
    const viewBtn = document.getElementById("viewBtn");
    const zeroBtn = document.getElementById("zeroBtn");
    const viewBtnTop = document.getElementById("viewBtnTop");
    const infoBtn = document.getElementById("infoBtn");
    const fullScreenBtn = document.getElementById("fullScreenBtn");
    const groupDisplay = document.getElementById("groupDisplay");
    const questionDisplay = document.getElementById("questionDisplay");
    const statusText = document.getElementById("statusText");
    const totalCount = document.getElementById("totalCount");
    const usedCount = document.getElementById("usedCount");
    const remainingCount = document.getElementById("remainingCount");
    const infoTurnText = document.getElementById("infoTurnText");
    const infoModal = document.getElementById("infoModal");
    const closeInfoBtn = document.getElementById("closeInfoBtn");
    const resultModal = document.getElementById("resultModal");
    const resultGroup = document.getElementById("resultGroup");
    const resultQuestion = document.getElementById("resultQuestion");
    const questionModal = document.getElementById("questionModal");
    const closeQuestionBtn = document.getElementById("closeQuestionBtn");
    const modalTopic = document.getElementById("modalTopic");
    const modalQuestionCode = document.getElementById("modalQuestionCode");
    const modalQuestionContent = document.getElementById("modalQuestionContent");
    const toast = document.getElementById("toast");

    // ===== HÀM TIỆN ÍCH =====
    function clean(value) {
      return String(value ?? "").normalize("NFC").trim();
    }

    function normalize(value) {
      return clean(value)
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/đ/g, "d")
        .replace(/Đ/g, "D")
        .toLowerCase()
        .replace(/[^a-z0-9]/g, "");
    }

    function findValue(row, acceptedHeaders) {
      const aliases = acceptedHeaders.map(normalize);
      for (const [key, value] of Object.entries(row)) {
        if (aliases.includes(normalize(key))) return value;
      }
      return "";
    }

    function randomItem(items) {
      return items[Math.floor(Math.random() * items.length)] || null;
    }

    function showToast(message, type = "normal") {
      toast.textContent = message;
      toast.className = `toast show${type === "error" ? " error" : ""}`;
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => toast.classList.remove("show"), 3300);
    }

    function setStatus(message, visible = false) {
      statusText.textContent = message;
      statusText.classList.toggle("show", Boolean(visible));
    }

    function makeStorageKey(file) {
      const raw = `${file.name}|${file.size}|${file.lastModified}`;
      return `boc_tham_co_dinh_v1_${btoa(unescape(encodeURIComponent(raw))).replace(/=+$/g, "")}`;
    }

    function loadProgress() {
      nextResultIndex = 0;
      try {
        const saved = JSON.parse(localStorage.getItem(storageKey) || "{}");
        const savedIndex = Number(saved.nextResultIndex);
        if (Number.isInteger(savedIndex) && savedIndex >= 0) {
          nextResultIndex = Math.min(savedIndex, presetResults.length);
        }
      } catch (error) {
        console.warn("Không đọc được tiến trình bốc thăm:", error);
      }
    }

    function saveProgress() {
      try {
        localStorage.setItem(storageKey, JSON.stringify({ nextResultIndex }));
      } catch (error) {
        console.warn("Không lưu được tiến trình bốc thăm:", error);
      }
    }

    function updateControls() {
      const total = presetResults.length;
      const used = Math.min(nextResultIndex, total);
      const remaining = Math.max(total - used, 0);

      totalCount.textContent = String(total);
      usedCount.textContent = String(used);
      remainingCount.textContent = String(remaining);

      spinBtn.disabled = isRolling || rollingQuestions.length === 0 || remaining === 0;
      resetBtn.disabled = isRolling || total === 0 || used === 0;
      viewBtn.disabled = isRolling || !currentResult;
      zeroBtn.disabled = isRolling || !currentResult;
      viewBtnTop.disabled = isRolling || !currentResult;
      excelFile.disabled = isRolling;
      sampleBtn.disabled = isRolling;

      if (isRolling) {
        const currentTurn = Math.min(used + 1, total);
        infoTurnText.textContent = `ĐANG BỐC THĂM · LƯỢT ${currentTurn}/${total}`;
        return;
      }

      // Chỉ dòng "ĐANG BỐC THĂM" được hiển thị trên màn hình chính.
      setStatus("", false);

      if (allQuestions.length === 0) {
        infoTurnText.textContent = "CHƯA NẠP DỮ LIỆU";
      } else if (rollingQuestions.length < ROLLING_POOL_SIZE) {
        infoTurnText.textContent = `FILE CHƯA ĐỦ ${ROLLING_POOL_SIZE} DÒNG CHẠY`;
      } else if (total === 0) {
        infoTurnText.textContent = `CHƯA CÓ KẾT QUẢ TỪ VỊ TRÍ ${ROLLING_POOL_SIZE + 1}`;
      } else if (remaining > 0) {
        infoTurnText.textContent = `ĐÃ BỐC ${used}/${total} · LƯỢT TIẾP THEO ${used + 1}/${total}`;
      } else {
        infoTurnText.textContent = `ĐÃ HOÀN TẤT ${total}/${total} LƯỢT`;
      }
    }

    // ===== ÂM THANH ROLLING =====
    let audioContext = null;

    function getAudioContext() {
      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      if (!AudioContextClass) return null;

      if (!audioContext) audioContext = new AudioContextClass();
      if (audioContext.state === "suspended") {
        audioContext.resume().catch(() => {});
      }
      return audioContext;
    }

    function playRollingTick() {
      try {
        const context = getAudioContext();
        if (!context) return;

        const now = context.currentTime;
        const oscillator = context.createOscillator();
        const gain = context.createGain();

        oscillator.type = "triangle";
        oscillator.frequency.setValueAtTime(500 + Math.random() * 220, now);

        gain.gain.setValueAtTime(0.055, now);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.055);

        oscillator.connect(gain);
        gain.connect(context.destination);
        oscillator.start(now);
        oscillator.stop(now + 0.06);
      } catch (error) {
        console.warn("Không phát được âm thanh rolling:", error);
      }
    }

    function playResultSound() {
      try {
        const context = getAudioContext();
        if (!context) return;

        const now = context.currentTime;
        [720, 960].forEach((frequency, index) => {
          const oscillator = context.createOscillator();
          const gain = context.createGain();
          const startTime = now + index * 0.11;

          oscillator.type = "sine";
          oscillator.frequency.setValueAtTime(frequency, startTime);

          gain.gain.setValueAtTime(0.0001, startTime);
          gain.gain.exponentialRampToValueAtTime(0.12, startTime + 0.015);
          gain.gain.exponentialRampToValueAtTime(0.0001, startTime + 0.16);

          oscillator.connect(gain);
          gain.connect(context.destination);
          oscillator.start(startTime);
          oscillator.stop(startTime + 0.18);
        });
      } catch (error) {
        console.warn("Không phát được âm thanh kết quả:", error);
      }
    }

    // ===== ĐỌC EXCEL =====
    // Sheet ChuDe: MaChuDe | TenChuDe
    // Sheet CauHoi: MaChuDe | MaCauHoi | NoiDungCauHoi
    // 30 dòng dữ liệu hợp lệ đầu tiên chỉ dùng để chạy hiệu ứng.
    // Dòng hợp lệ thứ 31 là kết quả lần 1, dòng 32 là kết quả lần 2, ...
    function readTopicRows(workbook) {
      const exactName = workbook.SheetNames.find(name => normalize(name) === "chude");
      if (!exactName) throw new Error('Không tìm thấy sheet "ChuDe".');

      const rows = XLSX.utils.sheet_to_json(workbook.Sheets[exactName], {
        defval: "",
        raw: false
      });

      const result = rows.map((row, index) => ({
        code: clean(findValue(row, ["MaChuDe", "Mã chủ đề"])),
        name: clean(findValue(row, ["TenChuDe", "Tên chủ đề"])),
        excelRow: index + 2
      })).filter(item => item.code || item.name);

      if (result.length === 0) {
        throw new Error('Sheet "ChuDe" phải có hai cột MaChuDe và TenChuDe.');
      }

      const seen = new Set();
      result.forEach(topic => {
        if (!topic.code || !topic.name) {
          throw new Error(`Sheet "ChuDe" thiếu mã hoặc tên tại dòng ${topic.excelRow}.`);
        }
        const key = normalize(topic.code);
        if (seen.has(key)) {
          throw new Error(`Mã chủ đề bị trùng tại dòng ${topic.excelRow}: ${topic.code}`);
        }
        seen.add(key);
      });

      return result;
    }

    function readQuestionRows(workbook, topicList) {
      const exactName = workbook.SheetNames.find(name => normalize(name) === "cauhoi");
      if (!exactName) throw new Error('Không tìm thấy sheet "CauHoi".');

      const rows = XLSX.utils.sheet_to_json(workbook.Sheets[exactName], {
        defval: "",
        raw: false
      });

      const source = rows.map((row, index) => ({
        topicCode: clean(findValue(row, ["MaChuDe", "Mã chủ đề"])),
        questionCode: clean(findValue(row, ["MaCauHoi", "Mã câu hỏi"])),
        content: clean(findValue(row, ["NoiDungCauHoi", "Nội dung câu hỏi"])),
        excelRow: index + 2
      })).filter(item => item.topicCode || item.questionCode || item.content);

      if (source.length === 0) {
        throw new Error('Sheet "CauHoi" phải có ba cột MaChuDe, MaCauHoi và NoiDungCauHoi.');
      }

      const topicMap = new Map(topicList.map(topic => [normalize(topic.code), topic]));

      return source.map((row, index) => {
        if (!row.topicCode || !row.questionCode || !row.content) {
          throw new Error(`Sheet "CauHoi" thiếu dữ liệu tại dòng ${row.excelRow}.`);
        }

        const topic = topicMap.get(normalize(row.topicCode));
        if (!topic) {
          throw new Error(
            `Mã chủ đề ${row.topicCode} tại dòng ${row.excelRow} không tồn tại trong sheet "ChuDe".`
          );
        }

        return {
          topicCode: topic.code,
          topicName: topic.name,
          questionCode: row.questionCode,
          content: row.content,
          excelRow: row.excelRow,
          dataPosition: index + 1
        };
      });
    }

    excelFile.addEventListener("change", async event => {
      const file = event.target.files?.[0];
      if (!file) return;

      if (typeof XLSX === "undefined") {
        showToast("Không tải được thư viện đọc Excel. Hãy kiểm tra Internet.", "error");
        return;
      }

      if (!/\.(xlsx|xls|xlsm)$/i.test(file.name)) {
        showToast("Vui lòng chọn file Excel .xlsx, .xls hoặc .xlsm.", "error");
        return;
      }

      try {
        setStatus("ĐANG ĐỌC DỮ LIỆU EXCEL...");
        const arrayBuffer = await file.arrayBuffer();
        const workbook = XLSX.read(arrayBuffer, { type: "array" });

        topics = readTopicRows(workbook);
        allQuestions = readQuestionRows(workbook, topics);
        rollingQuestions = allQuestions.slice(0, ROLLING_POOL_SIZE);
        presetResults = allQuestions.slice(ROLLING_POOL_SIZE);

        storageKey = makeStorageKey(file);
        loadProgress();

        currentResult = null;
        groupDisplay.textContent = "0";
        questionDisplay.textContent = "0";
        infoModal.classList.remove("show");
        resultModal.classList.remove("show");
        questionModal.classList.remove("show");

        fileLabel.textContent =
          `✅ ${file.name} · ${rollingQuestions.length} CÂU CHẠY · ${presetResults.length} KẾT QUẢ CỐ ĐỊNH`;

        updateControls();

        if (rollingQuestions.length < ROLLING_POOL_SIZE) {
          showToast(`File phải có ít nhất ${ROLLING_POOL_SIZE} dòng dữ liệu hợp lệ.`, "error");
        } else if (presetResults.length === 0) {
          showToast(`Đã nạp 30 câu chạy. Hãy thêm kết quả cố định từ vị trí 31.`, "error");
        } else {
          showToast(
            `Đã nạp ${rollingQuestions.length} câu chạy và ${presetResults.length} kết quả cố định.`
          );
        }
      } catch (error) {
        console.error(error);
        topics = [];
        allQuestions = [];
        rollingQuestions = [];
        presetResults = [];
        nextResultIndex = 0;
        currentResult = null;
        groupDisplay.textContent = "LỖI";
        questionDisplay.textContent = "LỖI";
        updateControls();
        setStatus(error.message || "KHÔNG ĐỌC ĐƯỢC FILE EXCEL");
        showToast(error.message || "Không đọc được file Excel.", "error");
      }
    });

    // ===== QUAY SỐ VÀ TRẢ KẾT QUẢ THEO THỨ TỰ CỐ ĐỊNH =====
    function startRolling() {
      if (isRolling) return;

      if (rollingQuestions.length < ROLLING_POOL_SIZE) {
        showToast(`Cần đủ ${ROLLING_POOL_SIZE} dòng đầu để chạy hiệu ứng.`, "error");
        updateControls();
        return;
      }

      const finalItem = presetResults[nextResultIndex];
      if (!finalItem) {
        showToast("Đã hết kết quả cố định được sắp đặt trong file Excel.", "error");
        updateControls();
        return;
      }

      getAudioContext();
      playRollingTick();

      isRolling = true;
      currentResult = null;
      infoModal.classList.remove("show");
      resultModal.classList.remove("show");
      questionModal.classList.remove("show");
      window.clearTimeout(resultTimer);
      groupDisplay.classList.add("rolling");
      questionDisplay.classList.add("rolling");
      setStatus("ĐANG BỐC THĂM", true);
      updateControls();

      const intervalId = window.setInterval(() => {
        const preview = randomItem(rollingQuestions);
        if (!preview) return;
        groupDisplay.textContent = preview.topicCode;
        questionDisplay.textContent = preview.questionCode;
        playRollingTick();
      }, ROLL_INTERVAL_MS);

      window.setTimeout(() => {
        window.clearInterval(intervalId);
        groupDisplay.classList.remove("rolling");
        questionDisplay.classList.remove("rolling");

        currentResult = finalItem;
        nextResultIndex += 1;
        saveProgress();

        groupDisplay.textContent = finalItem.topicCode;
        questionDisplay.textContent = finalItem.questionCode;
        resultGroup.textContent = finalItem.topicCode;
        resultQuestion.textContent = finalItem.questionCode;
        resultModal.classList.add("show");
        playResultSound();

        isRolling = false;
        updateControls();

        resultTimer = window.setTimeout(() => {
          resultModal.classList.remove("show");
        }, RESULT_VISIBLE_MS);
      }, ROLL_DURATION_MS);
    }

    spinBtn.addEventListener("click", startRolling);

    document.addEventListener("keydown", event => {
      const target = event.target;
      const typing = target instanceof HTMLInputElement || target instanceof HTMLTextAreaElement;

      if (event.code === "Space" && !typing && !spinBtn.disabled) {
        event.preventDefault();
        startRolling();
      }

      if (event.key === "Escape") {
        infoModal.classList.remove("show");
        resultModal.classList.remove("show");
        questionModal.classList.remove("show");
      }
    });

    // ===== XEM THÔNG TIN VÀ SỐ LƯỢT =====
    infoBtn.addEventListener("click", () => {
      updateControls();
      infoModal.classList.add("show");
    });

    closeInfoBtn.addEventListener("click", () => infoModal.classList.remove("show"));

    infoModal.addEventListener("click", event => {
      if (event.target === infoModal) infoModal.classList.remove("show");
    });

    // ===== XEM NỘI DUNG CÂU HỎI =====
    function openQuestion() {
      if (!currentResult) return;
      modalTopic.textContent = `${currentResult.topicCode} — ${currentResult.topicName}`;
      modalQuestionCode.textContent = currentResult.questionCode;
      modalQuestionContent.textContent = currentResult.content;
      questionModal.classList.add("show");
    }

    viewBtn.addEventListener("click", openQuestion);
    viewBtnTop.addEventListener("click", openQuestion);
    closeQuestionBtn.addEventListener("click", () => questionModal.classList.remove("show"));

    questionModal.addEventListener("click", event => {
      if (event.target === questionModal) questionModal.classList.remove("show");
    });

    resultModal.addEventListener("click", event => {
      if (event.target === resultModal) resultModal.classList.remove("show");
    });

    // ===== TRẢ HAI Ô VỀ 0 =====
    // Chỉ đưa giao diện về 0. Không lùi thứ tự kết quả cố định.
    function returnDisplayToZero() {
      if (isRolling || !currentResult) return;

      window.clearTimeout(resultTimer);
      resultModal.classList.remove("show");
      questionModal.classList.remove("show");
      groupDisplay.textContent = "0";
      questionDisplay.textContent = "0";
      currentResult = null;
      infoModal.classList.remove("show");

      updateControls();
      showToast("Đã đưa hai ô về 0. Lượt kết quả tiếp theo vẫn giữ đúng thứ tự đã sắp đặt.");
    }

    zeroBtn.addEventListener("click", returnDisplayToZero);

    // ===== ĐẶT LẠI TOÀN BỘ THỨ TỰ =====
    resetBtn.addEventListener("click", () => {
      if (isRolling || presetResults.length === 0) return;

      const accepted = window.confirm(
        `Đặt lại ${nextResultIndex} lượt đã chạy để bắt đầu lại từ kết quả ở vị trí ${ROLLING_POOL_SIZE + 1}?`
      );
      if (!accepted) return;

      nextResultIndex = 0;
      saveProgress();
      currentResult = null;
      groupDisplay.textContent = "0";
      questionDisplay.textContent = "0";
      resultModal.classList.remove("show");
      questionModal.classList.remove("show");
      updateControls();
      showToast("Đã đặt lại. Lần quay tiếp theo sẽ lấy kết quả tại vị trí 31.");
    });

    // ===== TẠO FILE EXCEL MẪU =====
    sampleBtn.addEventListener("click", () => {
      if (typeof XLSX === "undefined") {
        showToast("Không tải được thư viện Excel.", "error");
        return;
      }

      const topicData = [
        { MaChuDe: 1, TenChuDe: "Chủ đề, Mục tiêu và Động lực phát triển" },
        { MaChuDe: 2, TenChuDe: "Xây dựng Đảng và Hệ thống chính trị" },
        { MaChuDe: 3, TenChuDe: "Phát triển Kinh tế - Xã hội" },
        { MaChuDe: 4, TenChuDe: "Văn hóa, Giáo dục và Con người" },
        { MaChuDe: 5, TenChuDe: "Quốc phòng, An ninh và Đối ngoại" },
        { MaChuDe: 6, TenChuDe: "Các đột phá chiến lược" }
      ];

      const questionData = [];

      // 30 dòng đầu: chỉ dùng để hiển thị số chạy ngẫu nhiên trong 3 giây.
      for (let position = 1; position <= ROLLING_POOL_SIZE; position += 1) {
        questionData.push({
          MaChuDe: ((position - 1) % topicData.length) + 1,
          MaCauHoi: position,
          NoiDungCauHoi: `Dữ liệu chạy số ở vị trí ${position}. Nội dung này không phải kết quả cố định.`
        });
      }

      // Từ vị trí 31 trở đi: kết quả thật theo đúng thứ tự từng lượt quay.
      for (let turn = 1; turn <= 5; turn += 1) {
        const position = ROLLING_POOL_SIZE + turn;
        questionData.push({
          MaChuDe: ((turn + 1) % topicData.length) + 1,
          MaCauHoi: position,
          NoiDungCauHoi: `Kết quả cố định lượt ${turn}. Hãy sửa nhóm, mã câu hỏi và nội dung theo ý muốn.`
        });
      }

      const guideData = [
        { HuongDan: "1. Không đổi tên ba sheet ChuDe, CauHoi và HuongDan." },
        { HuongDan: "2. Sheet ChuDe giữ đúng cột MaChuDe và TenChuDe." },
        { HuongDan: "3. Sheet CauHoi giữ đúng ba cột MaChuDe, MaCauHoi và NoiDungCauHoi." },
        { HuongDan: "4. 30 dòng dữ liệu hợp lệ đầu tiên chỉ dùng để chạy hiệu ứng nhảy số." },
        { HuongDan: "5. Dòng dữ liệu hợp lệ thứ 31 là kết quả lần quay 1; dòng 32 là lần 2; dòng 33 là lần 3..." },
        { HuongDan: "6. Vị trí được tính theo thứ tự dòng dữ liệu hợp lệ, không tính hàng tiêu đề." },
        { HuongDan: "7. Có thể đặt MaChuDe và MaCauHoi tùy ý ở phần kết quả cố định, miễn MaChuDe tồn tại trong sheet ChuDe." },
        { HuongDan: "8. Nút Trả về 0 không lùi lượt; nút Đặt lại mới quay lại kết quả ở vị trí 31." }
      ];

      const workbook = XLSX.utils.book_new();
      const topicSheet = XLSX.utils.json_to_sheet(topicData);
      const questionSheet = XLSX.utils.json_to_sheet(questionData);
      const guideSheet = XLSX.utils.json_to_sheet(guideData);

      topicSheet["!cols"] = [{ wch: 15 }, { wch: 60 }];
      questionSheet["!cols"] = [{ wch: 15 }, { wch: 15 }, { wch: 95 }];
      guideSheet["!cols"] = [{ wch: 120 }];

      XLSX.utils.book_append_sheet(workbook, topicSheet, "ChuDe");
      XLSX.utils.book_append_sheet(workbook, questionSheet, "CauHoi");
      XLSX.utils.book_append_sheet(workbook, guideSheet, "HuongDan");
      XLSX.writeFile(workbook, "DuLieuBocTham_KetQuaCoDinh_Mau.xlsx");
      showToast("Đã tạo Excel mẫu: 30 dòng chạy và 5 kết quả cố định.");
    });

    // ===== TOÀN MÀN HÌNH =====
    fullScreenBtn.addEventListener("click", async () => {
      try {
        if (!document.fullscreenElement) {
          await document.documentElement.requestFullscreen();
          fullScreenBtn.textContent = "✕ THOÁT TOÀN MÀN HÌNH";
        } else {
          await document.exitFullscreen();
        }
      } catch (error) {
        showToast("Trình duyệt không cho phép mở toàn màn hình.", "error");
      }
    });

    document.addEventListener("fullscreenchange", () => {
      if (!document.fullscreenElement) fullScreenBtn.textContent = "⛶ TOÀN MÀN HÌNH";
    });
  </script>
</body>
